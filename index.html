<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Into the Woods — Engine v1.0</title>
  <link rel="stylesheet" href="./src/style.css" />
</head>
<body>
  <div class="wrap">
    <canvas id="game" width="640" height="420"></canvas>
    <div id="msg" class="msg">Engine v1.0 ready. Chapter panel + refmatch styles online. C=chapter, D=debug, R=reroll, S=style, G=random dialogue.</div>
    <div id="status" class="status"></div>
    <div id="chapterPanel" class="chapterPanel chapterPanel--expanded" aria-live="polite">
      <div class="chapterPanelHeader">
        <strong id="chapterTitle">Chapter: n/a</strong>
        <span id="chapterModeHint" class="chapterHint">C=toggle</span>
      </div>
      <div id="chapterObjective" class="chapterObjective">Objective: n/a</div>
      <div id="chapterFlags" class="chapterFlags">Unlocks: n/a</div>
    </div>
    <div id="dialogue" class="dialogue hidden">
      <div id="dlgSpeaker" class="dlgSpeaker"></div>
      <div id="dlgLine" class="dlgLine"></div>
      <div id="dlgChoices" class="dlgChoices"></div>
    </div>
    <div class="row">
      <label class="styleLabel">Style
        <select id="styleSelect"></select>
      </label>
      <button id="btnApplyStyle">Apply Style</button>
      <button id="btnCycleStyle">Next Style</button>
      <button id="btnReroll">Reroll Art</button>
    </div>
    <div class="row">
      <label class="styleLabel">Dialogue Lab
        <select id="dialogueSelect"></select>
      </label>
      <button id="btnStartDialogue">Start Selected Dialogue</button>
      <button id="btnRandomDialogue">Random Dialogue</button>
    </div>
    <div class="row">
      <button id="btnSave">Save (download savegame.json)</button>
      <label class="fileBtn">Load savegame.json <input id="fileLoad" type="file" accept="application/json" /></label>
      <button id="btnReset">Reset</button>
    </div>
  </div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
